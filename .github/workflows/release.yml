name: release

# Build a static prebuilt binary and attach it to a GitHub Release whenever a
# version tag is pushed. The one-line installer (install.sh) downloads it, so a
# fresh machine never needs a Rust toolchain.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add musl target + tools
        run: |
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get update && sudo apt-get install -y musl-tools

      # Deps are pure-Rust (serde/toml/toml_edit/clap/anyhow); git is shelled out,
      # so a fully static musl build links cleanly with no C/openssl dependency.
      - name: Build static binary
        run: cargo build --release --locked --target x86_64-unknown-linux-musl --bin dotfiles

      - name: Stage asset
        run: cp target/x86_64-unknown-linux-musl/release/dotfiles dotfiles-x86_64-linux

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dotfiles-x86_64-linux
          fail_on_unmatched_files: true
          generate_release_notes: true
