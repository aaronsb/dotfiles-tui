# dotfiles-tui — manifest fixture (ADR-003 TOML array-of-tables).
#
# Mirrors the real .dotfiles 14-entry manifest, with agent-drafted `why`
# docstrings (ADR-002). The `why` strings are intent-first drafts for the human
# to refine — they explain *why an entry exists*, not the mechanical *what*.
#
# Fields: name, path (source, relative to repo root), target (relative to $HOME),
#         enabled, mode (symlink|copy), why.

[[entry]]
name = "tmux"
path = "tmux/.tmux.conf"
target = ".tmux.conf"
why = "Terminal multiplexer config — persistent sessions and vim-style pane navigation, kept identical across machines so muscle memory carries over."

[[entry]]
name = "zsh"
path = "zsh/.zshrc"
target = ".zshrc"
why = "Interactive shell baseline (prompt, history, keybindings). The reason a fresh box behaves like the others without re-deriving settings."

[[entry]]
name = "nvim"
path = "nvim"
target = ".config/nvim"
why = "Neovim configuration carried whole so editing feels the same everywhere."

[[entry]]
name = "zsh-config"
path = "zsh/.zsh"
target = ".zsh"
why = "Supporting zsh fragments (aliases, functions) sourced by .zshrc; split out to keep .zshrc readable."

[[entry]]
name = "oh-my-posh-themes"
path = "oh-my-posh/themes"
target = ".config/oh-my-posh/themes"
why = "oh-my-posh prompt themes — the set the shell prompt can switch between."

[[entry]]
name = "posh-theme"
path = "oh-my-posh/posh-theme"
target = ".local/bin/posh-theme"
why = "Helper on PATH to switch the active oh-my-posh theme."

[[entry]]
name = "tmux-menu"
path = "tmux-menu/menus.toml"
target = ".config/tmux-menu/menus.toml"
why = "Declarative menu definitions for the tmux popup menu tool."

[[entry]]
name = "mlterm-fb-launcher"
path = "mlterm/mlterm-fb"
target = ".local/bin/mlterm-fb"
why = "Keyboard-resolving launcher for mlterm on the bare framebuffer console; auto-started on VT login so the raw console gets a usable terminal."

[[entry]]
name = "mlterm-fontgen"
path = "mlterm/mlterm-fontgen"
target = ".local/bin/mlterm-fontgen"
why = "Generates mlterm aafont config portably so glyphs render correctly on the framebuffer regardless of installed fonts."

[[entry]]
name = "mlfc-guard"
path = "mlterm/mlfc-guard"
target = ".local/bin/mlfc"
why = "Guard wrapper around mlfc keeping aafont generation safe and idempotent."

[[entry]]
name = "mlterm-main"
path = "mlterm/main"
target = ".mlterm/main"
why = "Core mlterm settings (font, scrollbar off, colors) for the framebuffer terminal."

[[entry]]
name = "mlterm-aafont"
path = "mlterm/aafont"
target = ".mlterm/aafont"
why = "mlterm anti-alias font mapping (generated); kept managed so a fresh machine has working fonts out of the box."

[[entry]]
name = "mlterm-color"
path = "mlterm/color"
target = ".mlterm/color"
why = "mlterm color palette."

[[entry]]
name = "zprofile"
path = "zsh/.zprofile"
target = ".zprofile"
why = "Login-shell profile: launches the keyboard-resolving mlterm-fb wrapper by absolute path on bare-VT console login (PATH lacks ~/.local/bin that early)."
